name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          read_package_version() {
            node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => { try { console.log(JSON.parse(input).version || '') } catch { console.log('') } })"
          }

          read_version_from_ref() {
            local ref="$1"
            local package_json
            package_json="$(git show "${ref}:package.json" 2>/dev/null || true)"
            if [ -z "${package_json}" ]; then
              echo ""
              return
            fi
            printf '%s' "${package_json}" | read_package_version
          }

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          CURRENT_SHA="$(git rev-parse HEAD)"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHOULD_RELEASE="true"
          PREVIOUS_PUSH_VERSION=""

          if [ "${EVENT_NAME}" = "push" ] && [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            PREVIOUS_PUSH_VERSION="$(read_version_from_ref "${BEFORE_SHA}")"
            if [ "${PREVIOUS_PUSH_VERSION}" = "${VERSION}" ]; then
              SHOULD_RELEASE="false"
            fi
          fi

          EXISTING_TAG_SHA="$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)"
          if [ "${SHOULD_RELEASE}" = "true" ] && [ -n "${EXISTING_TAG_SHA}" ] && [ "${EXISTING_TAG_SHA}" != "${CURRENT_SHA}" ]; then
            echo "::error::Release tag ${TAG} already exists on ${EXISTING_TAG_SHA}. Bump package.json version before publishing a new update."
            exit 1
          fi

          PREVIOUS_VERSION=""
          PREVIOUS_VERSION_COMMIT=""

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            while IFS= read -r commit; do
              COMMIT_VERSION="$(read_version_from_ref "${commit}")"
              if [ -z "${COMMIT_VERSION}" ]; then
                continue
              fi

              if [ -z "${PREVIOUS_VERSION}" ]; then
                if [ "${COMMIT_VERSION}" != "${VERSION}" ]; then
                  PREVIOUS_VERSION="${COMMIT_VERSION}"
                  PREVIOUS_VERSION_COMMIT="${commit}"
                fi
                continue
              fi

              if [ "${COMMIT_VERSION}" = "${PREVIOUS_VERSION}" ]; then
                PREVIOUS_VERSION_COMMIT="${commit}"
              else
                break
              fi
            done < <(git rev-list HEAD^ -- package.json)
          fi

          RANGE_START=""
          if [ -n "${PREVIOUS_VERSION}" ]; then
            PREVIOUS_TAG="v${PREVIOUS_VERSION}"
            if git rev-parse --verify "${PREVIOUS_TAG}" >/dev/null 2>&1; then
              RANGE_START="${PREVIOUS_TAG}"
            else
              RANGE_START="${PREVIOUS_VERSION_COMMIT}"
            fi
          fi

          {
            echo "should_release=${SHOULD_RELEASE}"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "image_name=${IMAGE_NAME}"
            echo "previous_push_version=${PREVIOUS_PUSH_VERSION}"
            echo "previous_version=${PREVIOUS_VERSION}"
            echo "range_start=${RANGE_START}"
          } >> "$GITHUB_OUTPUT"

          if [ "${SHOULD_RELEASE}" != "true" ]; then
            echo "package.json version is still ${VERSION}; skipping GitHub Release."
          fi

      - name: Skip release
        if: steps.meta.outputs.should_release != 'true'
        run: echo "No package version change detected, so no Release assets or notes were generated."

      - name: Setup Node.js
        if: steps.meta.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.meta.outputs.should_release == 'true'
        run: npm --prefix frontend ci

      - name: Build frontend
        if: steps.meta.outputs.should_release == 'true'
        run: npm --prefix frontend run build

      - name: Package release assets
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          STAGE_ROOT="release"
          STAGE_DIR="${STAGE_ROOT}/cloud-manager-${VERSION}"
          ASSET_DIR="release-assets"

          rm -rf "${STAGE_ROOT}" "${ASSET_DIR}"
          mkdir -p "${STAGE_DIR}/frontend" "${ASSET_DIR}"

          cp package.json package-lock.json README.md DEPLOY_DOCKER.md Dockerfile docker-compose.yml "${STAGE_DIR}/"
          cp -R backend "${STAGE_DIR}/backend"
          cp -R docs "${STAGE_DIR}/docs"
          cp -R scripts "${STAGE_DIR}/scripts"
          cp -R frontend/dist "${STAGE_DIR}/frontend/dist"
          cp frontend/package*.json "${STAGE_DIR}/frontend/"

          rm -rf "${STAGE_DIR}/backend/data"
          find "${STAGE_DIR}/scripts" -name "*.sh" -exec chmod +x {} \;

          tar -czf "${ASSET_DIR}/cloud-manager-${VERSION}.tar.gz" -C "${STAGE_ROOT}" "cloud-manager-${VERSION}"
          (cd "${STAGE_ROOT}" && zip -qr "../${ASSET_DIR}/cloud-manager-${VERSION}.zip" "cloud-manager-${VERSION}")
          (cd "${ASSET_DIR}" && sha256sum * > SHA256SUMS.txt)

          ls -lh "${ASSET_DIR}"

      - name: Generate release notes
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          IMAGE_NAME="${{ steps.meta.outputs.image_name }}"
          PREVIOUS_VERSION="${{ steps.meta.outputs.previous_version }}"
          RANGE_START="${{ steps.meta.outputs.range_start }}"

          {
            echo "## 更新日志"
            echo
            if [ -n "${RANGE_START}" ]; then
              echo "从 v${PREVIOUS_VERSION} 到 ${TAG}:"
              git log --no-merges --pretty=format:'- %s (%h)' "${RANGE_START}..HEAD"
            else
              echo "未找到上一个 package 版本号变更记录，仅列出当前发布提交:"
              git log --no-merges --pretty=format:'- %s (%h)' --max-count=1 HEAD
            fi
            echo
            echo
            echo "## 发布资源"
            echo
            echo "- cloud-manager-${VERSION}.tar.gz: 源码部署包，包含后端、已构建前端、部署脚本和文档。"
            echo "- cloud-manager-${VERSION}.zip: 与 tar.gz 内容一致，方便 Windows 环境下载解压。"
            echo "- SHA256SUMS.txt: 发布资源校验值。"
            echo
            echo "## Docker 镜像"
            echo
            echo "- ${IMAGE_NAME}:latest"
            echo "- ${IMAGE_NAME}:${VERSION}"
            echo "- ${IMAGE_NAME}:${GITHUB_SHA}"
          } > release-notes.md

          cat release-notes.md

      - name: Create or update GitHub Release
        if: steps.meta.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "cloud-manager ${TAG}" \
              --notes-file release-notes.md
          else
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "cloud-manager ${TAG}" \
              --notes-file release-notes.md
          fi

          gh release upload "${TAG}" release-assets/* --clobber
